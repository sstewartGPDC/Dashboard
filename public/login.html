<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPDC Dashboards — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Ubuntu:wght@500;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #B85C38;
      --primary-light: #D4775A;
      --gpdc-navy: #1a1a2e;
      --gpdc-bg: #f5f3f0;
      --gpdc-border: #e5e2dd;
      --bg-white: #ffffff;
    }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--gpdc-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: var(--bg-white);
      border-radius: 16px;
      border: 1px solid var(--gpdc-border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .login-brand img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }
    .login-brand-text {
      font-family: 'Ubuntu', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gpdc-navy);
    }
    .login-subtitle {
      font-size: 0.8125rem;
      color: #6b7280;
      margin-bottom: 2rem;
    }
    .login-field {
      margin-bottom: 1.25rem;
    }
    .login-field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--gpdc-navy);
      margin-bottom: 0.375rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.625rem 0.875rem;
      font-size: 0.875rem;
      font-family: 'Manrope', sans-serif;
      border: 1px solid var(--gpdc-border);
      border-radius: 8px;
      background: var(--gpdc-bg);
      color: var(--gpdc-navy);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(184,92,56,0.12);
    }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.875rem;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .login-btn:hover { background: var(--primary-light); }
    .login-btn:active { transform: scale(0.98); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      background: #fef2f2;
      color: #b91c1c;
      font-size: 0.8125rem;
      padding: 0.625rem 0.875rem;
      border-radius: 8px;
      border: 1px solid #fecaca;
      margin-bottom: 1rem;
      display: none;
    }
    .login-error.show { display: block; }
    .login-footer {
      text-align: center;
      font-size: 0.6875rem;
      color: #9ca3af;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-brand">
      <img src="https://cdn.prod.website-files.com/66c9595206b0d169d1677e69/66e9df4a3e925a89e1be2971_BlackGold%20-%20SYMBOL%20MARK.png" alt="GPDC Logo">
      <span class="login-brand-text">GPDC Dashboards</span>
    </div>
    <div class="login-subtitle">Sign in to access your dashboards</div>

    <div class="login-error" id="loginError"></div>

    <form id="loginForm">
      <div class="login-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>

    <div class="login-footer">Georgia Public Defender Council &bull; Internal Use Only</div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('loginError');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.add('show');
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.add('show');
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  </script>
</body>
</html>
