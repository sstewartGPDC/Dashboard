name = "gpdc-dashboard"
main = "src/index.js"
compatibility_date = "2024-09-23"
# SheetJS reaches for Buffer; nodejs_compat provides it (proven in the POC).
compatibility_flags = ["nodejs_compat"]

# Serve the app under the intranet sub-path on the gapubdef.org zone. This
# Worker route takes priority over Pages for matching requests; everything else
# on the zone still goes to the Pages site. The same Cloudflare Access policy
# that protects /intranet covers this path, so it's staff-gated.
routes = [
  { pattern = "gapubdef.org/intranet/apps/dashboards*", zone_name = "gapubdef.org" },
]

# Serve the existing frontend (public/) as static assets. The Worker handles
# /api/* and falls through to assets for everything else.
[assets]
directory = "../public"
binding = "ASSETS"

# Central database (Cloudflare D1).
[[d1_databases]]
binding = "DB"
database_name = "gpdc_dashboard"
# Replace with the real id from `wrangler d1 create gpdc_dashboard` before deploy.
database_id = "3ed6279b-0ec0-4cff-9a2c-4d9eb387d909"

# Short-lived storage for the two-step upload (preview-headers -> upload-mapped).
[[kv_namespaces]]
binding = "TEMP_UPLOADS"
id = "2ccf255aed7e4c23bee4bed9cd7aea80"

[vars]
# Comma-separated emails granted the 'admin' role. In production these are the
# same identities you'd put in the Cloudflare Access policy as admins.
# 'dev@local' is the fallback identity used in local `wrangler dev` (no Access).
ADMIN_EMAILS = "dev@local, sstewart@gapubdef.org"
# Sub-path the app is mounted under. The Worker strips this prefix before
# routing; the frontend resolves relative URLs via a <base> tag. Empty = root.
BASE_PATH = "/intranet/apps/dashboards"
# Roles: admin (ADMIN_EMAILS) > editor (default) > viewer (read-only).
# Set VIEWER_EMAILS for read-only users; set DEFAULT_ROLE="viewer" to make
# everyone read-only unless explicitly granted admin/editor.
# VIEWER_EMAILS = ""
# DEFAULT_ROLE = "editor"
